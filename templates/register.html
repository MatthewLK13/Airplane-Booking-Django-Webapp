{% extends 'base.html' %}
{% block content %}
<div class="min-h-[calc(100vh-64px)] flex items-center justify-center bg-slate-100">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
        <h2 class="text-3xl font-bold text-slate-800 mb-2 text-center">Đăng ký thành viên</h2>
        <p class="text-slate-500 text-center mb-8">Tham gia cùng Skyline ngay hôm nay</p>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">{{ field.label }}</label>
                    <div class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus-within:ring-2 ring-blue-500 transition">
                        {{ field }}
                    </div>
                    {% if field.help_text %}
                        <p class="text-[10px] text-slate-400 mt-1">{{ field.help_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-xl transition mt-4">
                Tạo tài khoản
            </button>
        </form>
    </div>
</div>

<style>
    /* Làm đẹp các ô input do Django tự tạo */
    input { width: 100%; background: transparent; outline: none; }
    ul.errorlist { color: #ef4444; font-size: 12px; margin-bottom: 10px; }
</style>
{% endblock %}
