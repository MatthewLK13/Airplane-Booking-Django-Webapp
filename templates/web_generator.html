{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto my-10 px-4">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-slate-800">Skyline <span class="text-blue-600">AI Web Builder</span>
        </h1>
        <p class="text-slate-500 mt-2">Nhập ý tưởng - AI sẽ thiết kế website cho bạn</p>
    </div>

    <div class="flex gap-4 mb-8 bg-white p-4 rounded-3xl shadow-xl border border-blue-100">
        <input type="text" id="topic-input" placeholder="Ví dụ: Cửa hàng trà sữa, Thuê xe tự lái, Đặt vé máy bay..."
            class="flex-1 p-4 text-lg outline-none rounded-2xl bg-slate-50 focus:ring-2 focus:ring-blue-500 transition">
        <button onclick="buildMySite()" id="btn-build"
            class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-blue-700 transition flex items-center gap-2">
            <span>Thiết kế ngay</span>
        </button>
    </div>

    <div id="action-bar" class="hidden flex justify-end gap-3 mb-2">
        <button onclick="previewFullSite()"
            class="flex items-center gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-xl hover:bg-slate-200 transition font-medium">
            <span> Xem trong Tab mới</span>
        </button>
        <button onclick="downloadHtml()"
            class="flex items-center gap-2 bg-green-500 text-white px-4 py-2 rounded-xl hover:bg-green-600 transition font-medium shadow-md">
            <span> Tải mã nguồn (html)</span>
        </button>
    </div>

    <div class="relative bg-slate-900 rounded-3xl p-2 shadow-2xl border-8 border-slate-800">
        <div class="flex gap-2 mb-2 px-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
        </div>
        <iframe id="preview-frame" class="w-full bg-white rounded-xl" style="height: 600px;"></iframe>
    </div>
</div>

<script>
    let generatedCode = ""; // Biến lưu code để dùng cho việc download

    function buildMySite() {
        const topic = document.getElementById('topic-input').value;
        const btn = document.getElementById('btn-build');
        const frame = document.getElementById('preview-frame');
        const actionBar = document.getElementById('action-bar');

        if (!topic) return alert("Khôi ơi, nhập chủ đề đã chứ!");

        btn.disabled = true;
        btn.innerHTML = "Đang thiết kế...";
        actionBar.classList.add('hidden'); // Ẩn nút khi đang load

        const formData = new FormData();
        formData.append('topic', topic);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        fetch('/api/generate-web/', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.html_code) {
                    generatedCode = data.html_code; // Lưu code vào biến
                    frame.srcdoc = generatedCode;
                    actionBar.classList.remove('hidden'); // Hiện nút khi đã có code
                } else {
                    alert("Lỗi: " + data.error);
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = "Thiết kế ngay";
            });
    }

    // Hàm 1: Mở web trong tab mới
    function previewFullSite() {
        const newWindow = window.open();
        newWindow.document.write(generatedCode);
        newWindow.document.close();
    }

    // Hàm 2: Tải file HTML về máy
    function downloadHtml() {
        const blob = new Blob([generatedCode], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'skyline_generated_site.html'; // Tên file khi tải về
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
{% endblock %}
