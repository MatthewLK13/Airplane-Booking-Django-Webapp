<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">  
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="bg-slate-50">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-2xl font-black text-blue-600 tracking-tighter">SKY•LINE</div>
            <div class="space-x-8 font-medium text-slate-600">
                <a href="/" class="hover:text-blue-600 transition">Chuyến bay</a>
                <a href="#" class="hover:text-blue-600 transition">Khuyến mãi</a>
                {% if user.is_authenticated %}
                    <span class="text-slate-900 font-semibold">Hi, {{ user.username }}</span>
                    <a href="/logout" class="text-red-500 text-sm">Thoát</a>
                {% else %}
                    <a href="/login" class="bg-blue-600 text-white px-5 py-2 rounded-full hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Đăng nhập</a>
                {% endif %}
                <a href="{% url 'web_generator' %}" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600 transition">Trình tạo Website</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
